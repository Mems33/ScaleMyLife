<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScaleMyLife</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12101f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ScaleMyLife">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Karla:wght@400;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12101f; --panel:#1b1830; --panel2:#221e3d; --line:#2e2950;
  --ink:#e8e4ff; --muted:#8f88b8; --gold:#f5c542; --hp:#ff5470;
  --xp:#3ddc84; --skill:#8f7bff; --good:#3ddc84; --blue:#5aa2ff; --purple:#b07bff; --orange:#ff9d47;
  --px:"Press Start 2P",monospace; --body:"Karla",system-ui,sans-serif; --mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-color:var(--line) var(--bg)}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.45;overflow-x:hidden;
  background-image:radial-gradient(ellipse 900px 400px at 50% -100px,color-mix(in srgb,var(--panel2) 80%,transparent) 0%,transparent 60%);transition:background .4s}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--bg);color:var(--ink);
  border:1px solid var(--line);border-radius:6px;padding:8px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--skill)}
::placeholder{color:#5c5684}
.wrap{max-width:1060px;margin:0 auto;padding:12px 16px 90px}
.wrap.shake{animation:shake .4s}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}
.logo{position:relative;text-align:center;font-family:var(--px);font-size:clamp(16px,4vw,26px);letter-spacing:4px;color:var(--ink);margin:14px 0 20px;
  text-shadow:0 2px 0 rgba(0,0,0,.5)}
.logo b{background:linear-gradient(180deg,#fff3c4 0%,var(--gold) 55%,color-mix(in srgb,var(--gold) 55%,#000) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 0 14px color-mix(in srgb,var(--gold) 45%,transparent))}
.logo::after{content:"";display:block;width:min(240px,50%);height:3px;margin:12px auto 0;border-radius:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold) 70%,transparent)}
.logo .gear{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;opacity:.6}
.logo .gear:hover{opacity:1;transform:translateY(-50%) rotate(30deg)}

/* ---------- HUD ---------- */
.hud{background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:14px 16px;
  box-shadow:0 0 0 2px var(--bg),0 0 0 4px color-mix(in srgb,var(--line) 70%,var(--skill)),0 14px 40px rgba(0,0,0,.45);
  display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;position:relative}
.hud .avatar{width:72px;height:72px;border:2px solid var(--gold);border-radius:8px;background:var(--panel2);
  display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:inset 0 0 0 3px var(--bg);cursor:pointer;transition:transform .15s}
.hud .avatar:hover{transform:scale(1.06)}
.hud .who{min-width:0}
.hud .name{font-family:var(--px);font-size:13px;letter-spacing:1px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.herotitle{font-size:12px;color:var(--muted);font-style:italic;margin-top:3px}
.rank{font-family:var(--px);font-size:9px;background:var(--panel2);border:1px solid;padding:4px 7px;border-radius:4px}
.bars{margin-top:10px;display:grid;gap:7px;max-width:560px}
.bar{position:relative;height:22px;background:#0d0b18;border:1px solid var(--line);border-radius:5px;overflow:hidden}
.bar>i{position:absolute;inset:0;width:0%;transition:width .5s cubic-bezier(.2,.8,.3,1)}
.bar.xp>i{background:linear-gradient(90deg,#22a566,var(--xp));box-shadow:0 0 10px rgba(61,220,132,.5)}
.bar.hp>i{background:linear-gradient(90deg,#c22e4d,var(--hp))}
.bar.hp.hurt{animation:hurt .5s}
@keyframes hurt{0%,60%{box-shadow:0 0 0 2px var(--hp),0 0 18px var(--hp)}}
.bar b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:700 12px var(--mono);color:#fff;text-shadow:0 1px 2px #000;letter-spacing:.5px;z-index:2}
.bar.xp>i::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);animation:shimmer 2.6s infinite;transform:translateX(-100%)}
@keyframes shimmer{60%{transform:translateX(100%)}100%{transform:translateX(100%)}}
.hud .side{display:flex;flex-direction:column;gap:7px;align-items:flex-end;font-family:var(--mono)}
.coin{color:var(--gold);font-weight:700;font-size:18px;display:flex;gap:6px;align-items:center}
.coin.pop{animation:coinpop .35s}
@keyframes coinpop{40%{transform:scale(1.35);text-shadow:0 0 14px var(--gold)}}
.flame{color:var(--orange);font-weight:700;font-size:14px}
.lvl{font-family:var(--px);font-size:10px;color:var(--muted)}
.nextrank{font-size:10px;color:var(--muted)}
/* skill bars keep the small size */
.skillcard .bar,.goal .bar{height:9px}
.skillcard .bar{height:7px}

/* weekly boss */
.boss{border:1px solid var(--hp);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(90deg,color-mix(in srgb,var(--hp) 9%,transparent),transparent)}
.boss .ic{font-size:32px;animation:bossbreathe 2.2s infinite}
@keyframes bossbreathe{50%{transform:scale(1.12);filter:drop-shadow(0 0 10px var(--hp))}}
.boss .grow{flex:1;min-width:0}
.boss .t{font-weight:700;font-size:16px}
.boss .sub{font-family:var(--mono);font-size:12px;color:var(--muted)}
.boss .sub b{color:var(--hp)}
.bosschip{font-family:var(--mono);font-size:12px;font-weight:700;border:1px solid var(--hp);color:var(--hp);border-radius:14px;padding:4px 12px;background:color-mix(in srgb,var(--hp) 8%,transparent)}

/* unlocked title chips */
.titlechips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.titlechips button{background:var(--panel2);border:1px solid color-mix(in srgb,var(--purple) 50%,var(--line));color:var(--purple);
  border-radius:14px;padding:4px 11px;font-size:12px;font-weight:700}
.titlechips button:hover{border-color:var(--gold);color:var(--gold)}

/* chest chip */
.chestchip{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:700;border:1px solid var(--line);border-radius:14px;padding:4px 12px;color:var(--muted);background:var(--panel2)}
.chestchip.ready{border-color:var(--gold);color:var(--gold);cursor:pointer;animation:chestglow 1.4s infinite}
.chestchip.claimed{color:var(--good);border-color:color-mix(in srgb,var(--good) 40%,var(--line))}

/* today tab */
.todayhead{display:flex;align-items:baseline;gap:12px;margin:2px 2px 12px;flex-wrap:wrap}
.todayhead .hi{font-family:var(--px);font-size:13px;color:var(--gold)}
.todayhead .dt{font-family:var(--mono);font-size:12px;color:var(--muted)}
.woundbar{border:1px solid var(--hp);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:center;
  background:color-mix(in srgb,var(--hp) 8%,transparent);font-size:14px}
.quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.quick button{border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:16px;padding:7px 14px;font-size:13px;font-weight:700}
.quick button.done{color:var(--good);border-color:color-mix(in srgb,var(--good) 40%,var(--line))}
.quick button:hover{border-color:var(--gold);color:var(--ink)}

/* agenda */
.ag{display:flex;align-items:center;gap:9px;padding:8px 9px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);margin-bottom:6px;font-size:14px}
.ag .grow{flex:1;min-width:0}
.ag .when{font-family:var(--mono);font-size:11px;font-weight:700;white-space:nowrap}
.ag.overdue{border-color:var(--hp)} .ag.overdue .when{color:var(--hp)}
.ag.today{border-color:var(--orange)} .ag.today .when{color:var(--orange)}
.ag.week .when{color:var(--blue)} .ag.later .when{color:var(--muted)}

/* weekly habit target */
.wk{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:700}

/* tutorial */
.tdots{display:flex;gap:7px;justify-content:center;margin:16px 0 4px}
.tdots i{width:9px;height:9px;border-radius:50%;background:var(--line)}
.tdots i.on{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.tutbig{font-size:44px;margin-bottom:12px}

/* habit 7-day dots */
.hdots{display:inline-flex;gap:3px;align-items:center}
.hd{width:9px;height:9px;border-radius:50%;background:var(--line)}
.hd.on{background:var(--xp);box-shadow:0 0 5px var(--xp)}
.hd.today{outline:1px solid var(--muted);outline-offset:1px}

/* ---------- skills ---------- */
.skills{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:12px}
.skillcard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 11px;position:relative}
.skillcard .t{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:6px}
.skillcard .t small{color:var(--skill);font-family:var(--mono);font-weight:700}
.skillcard .bar{height:7px}
.skillcard .bar>i{background:linear-gradient(90deg,#6a54e6,var(--skill))}
.skillcard .del{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--muted);font-size:11px;display:none}
.skillcard:hover .del{display:block}
.addskill{border:1px dashed var(--line);background:none;color:var(--muted);border-radius:8px;font-size:13px}
.addskill:hover{color:var(--ink);border-color:var(--skill)}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:6px;margin:18px 0 14px;flex-wrap:wrap;align-items:stretch}
.tabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
  font-family:var(--px);padding:11px 12px;border-radius:8px;letter-spacing:.5px;position:relative}
.tabs button{font-size:9.5px;padding:12px 13px;flex:1 1 auto;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.tabs .ti{font-size:13px;line-height:1}
.tabs .tl{letter-spacing:.5px}
.tabs button.pri{color:var(--ink);border-color:color-mix(in srgb,var(--gold) 40%,var(--line));background:color-mix(in srgb,var(--gold) 5%,var(--panel))}
.tabs button.on{color:var(--ink);border-color:var(--gold);background:var(--panel2);box-shadow:0 0 12px color-mix(in srgb,var(--gold) 20%,transparent)}
.tabs button .dot{position:absolute;top:5px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 1.2s infinite}
@keyframes pulse{50%{transform:scale(1.5);opacity:.5}}

/* ---------- panels & items ---------- */
.grid{display:grid;grid-template-columns:1fr;gap:14px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
.panel h3{font-family:var(--px);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;flex-wrap:wrap}
.panel h3 .cnt{color:var(--gold)}
.panel h3 .right{margin-left:auto}
.empty{color:#5c5684;font-size:14px;padding:8px 2px;font-style:italic}
.item{display:flex;align-items:center;gap:11px;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);margin-bottom:8px;transition:transform .15s;animation:slidein .25s}
@keyframes slidein{from{opacity:0;transform:translateY(6px)}}
.item:hover{transform:translateX(2px)}
.item.done{opacity:.45}
.item .grow{flex:1;min-width:0}
.item .title{font-weight:600;font-size:15px}
.item .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;border:1px solid}
.chip.easy{color:var(--good);border-color:var(--good)}
.chip.normal{color:var(--blue);border-color:var(--blue)}
.chip.hard{color:var(--purple);border-color:var(--purple)}
.chip.epic{color:var(--gold);border-color:var(--gold)}
.chip.skill{color:var(--skill);border-color:transparent;background:color-mix(in srgb,var(--skill) 12%,transparent)}
.chip.due{color:var(--orange);border-color:var(--orange)}
.chip.late{color:var(--hp);border-color:var(--hp)}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:7px;padding:8px 13px;font-weight:700;font-size:13px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold)}
.btn:active{transform:scale(.92)}
.btn.go{background:linear-gradient(180deg,#2fbf72,#219a59);border-color:#2fbf72;color:#04160c}
.btn.go:hover{filter:brightness(1.12)}
.btn.buy{background:linear-gradient(180deg,var(--gold),color-mix(in srgb,var(--gold) 70%,#000));border-color:var(--gold);color:#231a00}
.btn.buy:disabled{filter:grayscale(1);opacity:.4;cursor:not-allowed}
.btn.slip{background:linear-gradient(180deg,#e0435f,#b32a44);border-color:#e0435f;color:#fff}
.btn.ghost{background:none;color:var(--muted);border-color:transparent;padding:8px 6px}
.btn.ghost:hover{color:var(--hp)}
.btn.wide{width:100%;padding:11px}
.btn.small{padding:5px 9px;font-size:12px}
.form{display:grid;gap:8px;margin-top:10px;padding-top:12px;border-top:1px dashed var(--line)}
.form .row{display:flex;gap:8px}
.form label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
.form input[type=checkbox]{width:auto}
.presets{display:flex;gap:6px;flex-wrap:wrap}
.presets button{background:none;border:1px dashed var(--line);color:var(--muted);border-radius:14px;padding:4px 11px;font-size:12px}
.presets button:hover{color:var(--ink);border-color:var(--gold)}
.presets .plabel{font-size:11px;color:#5c5684;align-self:center}

/* main quests */
.goal{border:1px solid var(--gold);border-radius:10px;background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 7%,transparent),transparent);padding:14px;margin-bottom:12px;box-shadow:0 4px 18px rgba(0,0,0,.25)}
.goal .t{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.goal .title{font-weight:700;font-size:18px}
.goal .bar{height:10px;margin-top:10px}
.goal .bar>i{background:linear-gradient(90deg,color-mix(in srgb,var(--gold) 70%,#000),var(--gold));box-shadow:0 0 10px color-mix(in srgb,var(--gold) 40%,transparent)}
.goal .pct{font-family:var(--mono);font-size:12px;color:var(--gold);margin-top:5px}
.steps{margin-top:10px;display:grid;gap:6px}
.step{display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);font-size:14px}
.step.done{opacity:.45}
.step .grow{flex:1;min-width:0}
.stepadd{display:flex;gap:6px;margin-top:8px}
.stepadd select{max-width:110px}

/* habits */
.streakN{font-family:var(--mono);color:var(--orange);font-weight:700;font-size:12px}
.monster .title::before{content:"👾 "}
.clean{font-family:var(--mono);font-size:12px;color:var(--good)}

/* chest */
.chest{border:1px solid var(--gold);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,color-mix(in srgb,var(--gold) 10%,transparent),transparent)}
.chest .ic{font-size:30px}
.chest.ready{animation:chestglow 1.4s infinite}
.chest.ready .ic{animation:wiggle 1s infinite}
@keyframes chestglow{50%{box-shadow:0 0 22px color-mix(in srgb,var(--gold) 35%,transparent)}}
@keyframes wiggle{20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(4deg)}}
.chest .grow{flex:1}
.chest .t{font-weight:700}
.chest .hint{font-size:12px;color:var(--muted)}

/* market */
.shoptabs{display:flex;gap:6px;margin-bottom:12px}
.shoptabs button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:9px;border-radius:7px;font-weight:700;font-size:13px}
.shoptabs button.on{color:var(--ink);border-color:var(--gold)}
.price{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:15px;white-space:nowrap}
.afford{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* focus */
.focusbox{text-align:center;padding:22px 14px}
.focusbox.break{border-color:var(--orange);box-shadow:0 0 26px color-mix(in srgb,var(--orange) 18%,transparent)}
.phase{font-family:var(--px);font-size:11px;letter-spacing:2px;margin-bottom:10px}
.phase.work{color:var(--xp)} .phase.brk{color:var(--orange)}
.focusring{margin:0 auto 6px;width:190px;height:190px;position:relative;display:flex;align-items:center;justify-content:center}
.focusring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.focusring .time{font-family:var(--px);font-size:26px;color:var(--xp);letter-spacing:2px}
.focusring.brk .time{color:var(--orange)}
.doing{color:var(--muted);font-size:15px;margin-top:6px}
.sesh{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:12px;display:flex;gap:18px;justify-content:center;flex-wrap:wrap}
.sesh b{color:var(--gold)}
.sesh .g{color:var(--xp)}
.durchips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.durchips button{font-family:var(--px);font-size:9px;padding:12px 13px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:8px}
.durchips button.on{color:var(--ink);border-color:var(--xp);box-shadow:0 0 12px rgba(61,220,132,.2)}
.payline{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:6px}
.payline b{color:var(--gold)}
.yt{max-width:520px;margin:14px auto 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#000}
.yt iframe{display:block;width:100%;height:250px;border:0}
/* campfire break scene */
.campfire{position:relative;height:150px;margin:6px auto 10px;max-width:340px}
.campfire .fire{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);font-size:52px;animation:flicker 1s infinite}
@keyframes flicker{50%{transform:translateX(-50%) scale(1.12);filter:brightness(1.25)}}
.campfire .tent{position:absolute;left:14%;bottom:16px;font-size:40px}
.campfire .moon{position:absolute;right:12%;top:0;font-size:28px;animation:bob 3.5s infinite ease-in-out}
@keyframes bob{50%{transform:translateY(6px)}}
.campfire .z{position:absolute;left:26%;bottom:62px;font-size:16px;color:var(--muted);animation:zfloat 2.6s infinite}
.campfire .z2{left:30%;animation-delay:1.3s}
@keyframes zfloat{from{opacity:0;transform:translateY(0)}30%{opacity:1}to{opacity:0;transform:translateY(-38px)}}
.campfire .sp{position:absolute;left:50%;bottom:70px;font-size:12px;animation:sparkup 1.8s infinite}
.campfire .sp2{left:47%;animation-delay:.6s}.campfire .sp3{left:54%;animation-delay:1.2s}
@keyframes sparkup{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-46px)}}

/* journal */
.moods{display:flex;gap:8px;margin-bottom:10px}
.moods button{flex:1;font-size:26px;padding:9px 0;background:var(--panel2);border:1px solid var(--line);border-radius:8px;filter:grayscale(.7);transition:all .15s}
.moods button.on{filter:none;border-color:var(--gold);transform:scale(1.08)}
.stars{display:flex;gap:4px}
.stars button{background:none;border:none;font-size:21px;filter:grayscale(1);padding:2px}
.stars button.on{filter:none}
.jrow{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;align-items:baseline}
.jrow .d{font-family:var(--mono);color:var(--muted);font-size:12px;min-width:84px}

/* stats */
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center}
.stat .v{font-family:var(--px);font-size:15px;color:var(--gold)}
.stat .v.g{color:var(--xp)} .stat .v.r{color:var(--hp)} .stat .v.b{color:var(--blue)}
.stat .k{font-size:11px;color:var(--muted);margin-top:5px}
.chart{display:flex;gap:7px;align-items:flex-end;height:110px;padding:6px 2px 0}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.chart .colbar{width:100%;max-width:38px;background:linear-gradient(180deg,var(--xp),#1d7a4c);border-radius:4px 4px 0 0;min-height:2px;transition:height .6s cubic-bezier(.2,.8,.3,1)}
.chart .cl{font-family:var(--mono);font-size:10px;color:var(--muted)}
.moodstrip{display:flex;gap:7px;margin:4px 0 2px}
.moodstrip span{flex:1;text-align:center;font-size:19px}
.achgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.ach{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;display:flex;gap:9px;align-items:center}
.ach .ic{font-size:23px}
.ach .n{font-weight:700;font-size:13px}
.ach .d{font-size:11px;color:var(--muted)}
.ach.locked{opacity:.38;filter:grayscale(1)}
.ach.unlocked{border-color:var(--gold);box-shadow:0 0 10px color-mix(in srgb,var(--gold) 12%,transparent)}

/* log */
.logday{font-family:var(--px);font-size:9px;color:var(--muted);margin:14px 0 8px;letter-spacing:1px}
.logrow{display:flex;gap:10px;padding:7px 4px;border-bottom:1px solid color-mix(in srgb,var(--line) 70%,transparent);font-size:14px;align-items:baseline}
.logrow .tm{font-family:var(--mono);color:#5c5684;font-size:11px;min-width:44px}
.delta{font-family:var(--mono);font-size:12px;font-weight:700;margin-left:auto;white-space:nowrap;text-align:right}
.delta .p,.toast .p{color:var(--xp)} .delta .c,.toast .c{color:var(--gold)} .delta .h,.toast .h{color:var(--hp)} .delta .hg,.toast .hg{color:var(--good)}

/* toasts + fx */
#toasts{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:center}
.toast{background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:10px 18px;font-family:var(--mono);font-weight:700;font-size:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.5);animation:pop .25s cubic-bezier(.2,1.6,.4,1),fadeout .4s 2.4s forwards;display:flex;gap:12px}
.toast.dmg{border-color:var(--hp)}
.toast.ach{border-color:var(--purple);box-shadow:0 0 18px rgba(176,123,255,.3)}
@keyframes pop{from{transform:scale(.6);opacity:0}}
@keyframes fadeout{to{opacity:0;transform:translateY(-8px)}}
#overlay{position:fixed;inset:0;background:rgba(6,4,16,.87);z-index:80;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#overlay.show{display:flex}
.levelbox{text-align:center;animation:pop .4s cubic-bezier(.2,1.8,.4,1);padding:16px}
.levelbox .big{font-family:var(--px);font-size:26px;color:var(--gold);text-shadow:0 0 24px color-mix(in srgb,var(--gold) 60%,transparent);margin-bottom:14px}
.levelbox .sub{font-family:var(--mono);color:var(--ink);font-size:15px;margin-bottom:8px}
.levelbox .btn{margin-top:18px}
.rankbig{font-family:var(--px);font-size:88px;line-height:1;margin:10px 0 18px;animation:rankin .8s cubic-bezier(.2,1.6,.4,1),rankglow 1.6s .8s infinite}
@keyframes rankin{0%{transform:scale(3);opacity:0;filter:blur(6px)}60%{transform:scale(.92);opacity:1;filter:blur(0)}80%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes rankglow{50%{text-shadow:0 0 40px currentColor,0 0 80px currentColor}}
.rankname{font-family:var(--px);font-size:14px;letter-spacing:3px;margin-bottom:10px}
.spark{position:fixed;font-size:18px;z-index:81;animation:fly 1.1s ease-out forwards;pointer-events:none}
@keyframes fly{to{transform:translateY(-130px) rotate(30deg);opacity:0}}
.confetti{position:fixed;top:-12px;width:9px;height:9px;z-index:82;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.4}}
.flycoin{position:fixed;z-index:83;font-size:17px;pointer-events:none;transition:all .7s cubic-bezier(.3,.1,.4,1)}

/* modal */
.modal{position:fixed;inset:0;background:rgba(6,4,16,.8);z-index:70;display:none;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.modal .box{background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:22px;max-width:460px;width:100%;box-shadow:0 0 0 3px var(--bg),0 0 0 5px color-mix(in srgb,var(--line) 70%,var(--skill));max-height:92vh;overflow-y:auto}
.modal h2{font-family:var(--px);font-size:13px;margin-bottom:16px;color:var(--gold);line-height:1.7}
.avpick{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 6px}
.avpick button{font-size:22px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
.avpick button.on{border-color:var(--gold);box-shadow:0 0 8px color-mix(in srgb,var(--gold) 30%,transparent)}
.themes{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 6px}
.themes button{width:64px;height:40px;border-radius:8px;border:2px solid var(--line);position:relative;overflow:hidden}
.themes button.on{border-color:var(--gold);box-shadow:0 0 10px color-mix(in srgb,var(--gold) 35%,transparent)}
.themes button i{position:absolute;bottom:4px;left:4px;right:4px;height:8px;border-radius:3px}
.setrow{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.setrow .btn{flex:1}
.flabel{font-size:12px;color:var(--muted);margin:8px 0 3px;text-transform:uppercase;letter-spacing:1px}
.hint{font-size:12px;color:var(--muted);margin-top:4px}

@media(min-width:860px){.grid.two{grid-template-columns:1.4fr 1fr}}
@media(max-width:640px){
  body{font-size:15px}
  input,select,textarea{font-size:16px} /* 16px stops iOS zooming on focus */
  .wrap{padding:8px 10px calc(96px + env(safe-area-inset-bottom))}
  .logo{margin:8px 0 12px}
  .hud{grid-template-columns:auto 1fr;gap:12px;padding:12px}
  .hud .avatar{width:56px;height:56px;font-size:30px}
  .hud .name{font-size:11px}
  .hud .side{grid-column:1/-1;flex-direction:row;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px 12px}
  .bars{max-width:none}
  .bar{height:20px}
  /* bottom navigation, app-style */
  .tabs{position:fixed;left:0;right:0;bottom:0;z-index:50;margin:0;
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));
    background:color-mix(in srgb,var(--panel) 94%,transparent);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);gap:3px}
  .tabs button{flex:1 1 0;min-width:0;flex-direction:column;gap:4px;padding:8px 2px;border:none;background:none;border-radius:8px}
  .tabs button.pri{background:none}
  .tabs .ti{font-size:19px}
  .tabs .tl{font-size:6.5px}
  .tabs button.on{background:var(--panel2);border:1px solid var(--gold);box-shadow:none}
  .tabs button .dot{top:2px;right:8px}
  .item{flex-wrap:wrap}
  .item .grow{flex:1 1 100%;order:-1}
  .btn{padding:10px 14px}
  .btn.ghost{padding:10px 8px}
  .goal .t{flex-direction:column;align-items:flex-start}
  .stepadd{flex-wrap:wrap}
  .stepadd select{max-width:none;flex:1}
  .form .row{flex-wrap:wrap}
  .quick button{padding:10px 14px}
  .modal .box{padding:16px;max-height:86vh}
  .focusring{width:160px;height:160px}
  .focusbox .time{font-size:22px}
  .yt iframe{height:200px}
  .rankbig{font-size:60px}
  .statgrid{grid-template-columns:repeat(3,1fr)}
  .achgrid{grid-template-columns:1fr 1fr}
  .todayhead .hi{font-size:11px}
}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="logo"><b>SCALE MY LIFE</b><button class="gear" onclick="openSettings()" title="Settings">⚙️</button></div>
  <div class="hud" id="hud"></div>
  <div class="skills" id="skillsRow"></div>
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
</div>
<div id="toasts"></div>
<div id="overlay"></div>
<div class="modal" id="modal"></div>

<script src="core.js"></script>
<script>
'use strict';
var $ = function(s,el){ return (el||document).querySelector(s); };
var A = RPG.actions;
var state = RPG.load(localStorage);
var tab='today', shopTab='market', pendingMood=null, pendingQuality=3;
var focusMode={work:50,brk:10};

var RANK_COLORS={E:'#9a94b8',D:'#5aa2ff',C:'#3ddc84',B:'#b07bff',A:'#ff9d47',S:'#f5c542',SS:'#ff5fa2'};
var THEMES={
  dungeon:  {name:'Dungeon',  bg:'#12101f',panel:'#1b1830',panel2:'#221e3d',line:'#2e2950',accent:'#f5c542'},
  synthwave:{name:'Synthwave',bg:'#170b22',panel:'#221030',panel2:'#2c1440',line:'#45215e',accent:'#ff5fa2'},
  forest:   {name:'Forest',   bg:'#0d1712',panel:'#14231b',panel2:'#1a2f23',line:'#28492f',accent:'#7bd88f'},
  crimson:  {name:'Crimson',  bg:'#1a0d12',panel:'#26141b',panel2:'#321a23',line:'#4a2532',accent:'#ff7854'},
  ocean:    {name:'Ocean',    bg:'#0a1220',panel:'#101c30',panel2:'#15263f',line:'#22395c',accent:'#59c2ff'}
};
var MUSIC={
  none:{name:'🔇 No music',id:null},
  lofi:{name:'🎧 Lofi Girl radio',id:'jfKfPfyJRdk'},
  synth:{name:'🌆 Synthwave radio',id:'4xDzrJKXOOY'},
  custom:{name:'🔗 Custom YouTube URL',id:null}
};

function applyTheme(){
  var t=THEMES[(state&&state.settings.theme)||'dungeon']||THEMES.dungeon;
  var r=document.documentElement.style;
  r.setProperty('--bg',t.bg); r.setProperty('--panel',t.panel);
  r.setProperty('--panel2',t.panel2); r.setProperty('--line',t.line); r.setProperty('--gold',t.accent);
}
function persist(){ RPG.save(state, localStorage); }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ---------- sound ---------- */
var AC=null;
function beep(freq,when,dur,type,vol){
  if(!state || !state.settings.sound) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    var t=AC.currentTime+when, o=AC.createOscillator(), g=AC.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur);
  }catch(e){}
}
var SND={
  earn:function(){ beep(660,0,.09); beep(880,.09,.12); },
  levelup:function(){ [523,659,784,1047].forEach(function(f,i){ beep(f,i*.12,.22,'square',.07); }); },
  rankup:function(){ [392,523,659,784,1047,1319,1568].forEach(function(f,i){ beep(f,i*.13,.3,'square',.08); }); },
  dmg:function(){ beep(120,0,.28,'sawtooth',.09); beep(90,.1,.25,'sawtooth',.07); },
  buy:function(){ beep(880,0,.08,'triangle',.08); beep(1320,.08,.14,'triangle',.08); },
  chest:function(){ [660,880,1174,1568].forEach(function(f,i){ beep(f,i*.09,.14,'triangle',.08); }); },
  ach:function(){ [784,988,1175].forEach(function(f,i){ beep(f,i*.1,.18,'square',.06); }); },
  brk:function(){ [880,660,523].forEach(function(f,i){ beep(f,i*.15,.3,'triangle',.07); }); },
  resume:function(){ [523,784,1047].forEach(function(f,i){ beep(f,i*.1,.18,'triangle',.08); }); }
};

/* ---------- visual fx ---------- */
function toast(parts, cls){
  var t=document.createElement('div'); t.className='toast'+(cls?' '+cls:'');
  t.innerHTML=parts; $('#toasts').appendChild(t);
  setTimeout(function(){ t.remove(); }, 3000);
}
function sparks(ch){
  for(var i=0;i<5;i++){
    var s=document.createElement('div'); s.className='spark'; s.textContent=ch;
    s.style.left=(45+Math.random()*10)+'%'; s.style.top=(30+Math.random()*20)+'%';
    s.style.animationDelay=(i*0.06)+'s';
    document.body.appendChild(s); setTimeout(function(el){return function(){el.remove();}}(s),1300);
  }
}
function confetti(gold){
  var colors=gold?['#f5c542','#ffe08a','#fff2c4','#cf9f22']:['#f5c542','#3ddc84','#8f7bff','#ff5470','#5aa2ff','#ff9d47'];
  for(var i=0;i<(gold?40:28);i++){
    var c=document.createElement('div'); c.className='confetti';
    c.style.left=(15+Math.random()*70)+'%';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(1.4+Math.random()*1.4)+'s';
    c.style.animationDelay=(Math.random()*.4)+'s';
    if(i%3===0) c.style.borderRadius='50%';
    document.body.appendChild(c); setTimeout(function(el){return function(){el.remove();}}(c),3400);
  }
}
function flyCoins(n){
  var target=$('#coinCounter'); if(!target) return;
  var r=target.getBoundingClientRect();
  var count=Math.min(6,Math.max(2,Math.round(n/15)));
  for(var i=0;i<count;i++){
    (function(i){
      var c=document.createElement('div'); c.className='flycoin'; c.textContent='💰';
      c.style.left=(window.innerWidth/2-40+Math.random()*80)+'px';
      c.style.top=(window.innerHeight*0.45)+'px';
      document.body.appendChild(c);
      setTimeout(function(){ c.style.left=(r.left+r.width/2)+'px'; c.style.top=r.top+'px'; c.style.opacity='0'; c.style.transform='scale(.5)'; }, 30+i*90);
      setTimeout(function(){ c.remove(); var cc=$('#coinCounter'); if(cc){cc.classList.remove('pop'); void cc.offsetWidth; cc.classList.add('pop');} }, 780+i*90);
    })(i);
  }
}
function shake(){ var w=$('#wrap'); w.classList.remove('shake'); void w.offsetWidth; w.classList.add('shake'); }
function hurtBar(){ var b=$('.bar.hp'); if(b){ b.classList.add('hurt'); setTimeout(function(){ b.classList.remove('hurt'); },600); } }

function fx(res){
  if(!res) return;
  var bits=[];
  if(res.xp>0) bits.push('<span class="p">+'+res.xp+' XP</span>');
  if(res.coins>0) bits.push('<span class="c">+'+res.coins+' 💰</span>');
  if(res.coins<0) bits.push('<span class="c">'+res.coins+' 💰</span>');
  if(res.hp>0) bits.push('<span class="hg">+'+res.hp+' HP</span>');
  if(res.hp<0) bits.push('<span class="h">'+res.hp+' HP</span>');
  if(res.mult>1.001) bits.push('<span style="color:var(--orange)">×'+res.mult.toFixed(2)+' streak</span>');
  if(res.wounded) bits.push('<span class="h">🩸 ×0.5 wounded</span>');
  if(bits.length) toast(bits.join(''), (res.hp<0)?'dmg':'');
  if(res.hp<0){ shake(); hurtBar(); SND.dmg(); sparks('💢'); }
  else if(res.coins<0){ SND.buy(); sparks('🛍️'); }
  else if(res.xp>0){ SND.earn(); sparks('✨'); if(res.coins>0) flyCoins(res.coins); }
  (res.skillUps||[]).forEach(function(u){ toast('<span class="p">'+u.icon+' '+esc(u.name)+' → Lv.'+u.level+'</span>'); });
  if(res.newRank){ rankUp(res.newRank, res.levelUps[res.levelUps.length-1]); }
  else if(res.levelUps && res.levelUps.length){ levelUp(res.levelUps[res.levelUps.length-1]); }
  if(res.ko) koScreen();
}
function announceAchievements(list){
  (list||[]).forEach(function(a,i){
    setTimeout(function(){ toast('🏆 <span style="color:var(--purple)">'+a.icon+' '+esc(a.name)+'</span> unlocked!','ach'); SND.ach(); }, 400+i*700);
  });
}
function levelUp(lv){
  SND.levelup(); confetti();
  var o=$('#overlay'); o.className='show';
  o.innerHTML='<div class="levelbox"><div class="big">⬆ LEVEL UP!</div>'+
    '<div class="sub">'+esc(state.hero.name)+' reached <b style="color:var(--gold)">Level '+lv+'</b></div>'+
    '<div class="sub" style="color:var(--good)">❤️ HP fully restored</div>'+
    '<button class="btn go" onclick="closeOverlay()">Continue ▶</button></div>';
}
function rankUp(rank, lv){
  SND.rankup(); confetti(true); setTimeout(function(){confetti(true);},600);
  var col=RANK_COLORS[rank.code]||'#f5c542';
  var o=$('#overlay'); o.className='show';
  o.innerHTML='<div class="levelbox"><div class="big">🎖 RANK UP</div>'+
    '<div class="rankbig" style="color:'+col+'">'+rank.code+'</div>'+
    '<div class="rankname" style="color:'+col+'">'+esc(rank.name).toUpperCase()+'</div>'+
    '<div class="sub">'+esc(state.hero.name)+' hit Level '+lv+' and earned a new class.</div>'+
    '<div class="sub" style="color:var(--good)">❤️ HP fully restored · badge added</div>'+
    '<button class="btn go" onclick="closeOverlay()">Rise ▶</button></div>';
}
function koScreen(){
  var o=$('#overlay'); o.className='show';
  o.innerHTML='<div class="levelbox"><div class="big" style="color:var(--hp)">💀 KNOCKED OUT</div>'+
    '<div class="sub">The monsters got you. You wake up at the inn with 25 HP.</div>'+
    '<div class="sub" style="color:var(--muted)">Rest up: sleep well or visit the 🛏️ Hotel.</div>'+
    '<button class="btn" onclick="closeOverlay()">Get up</button></div>';
}
function chestScreen(res){
  SND.chest(); confetti();
  var o=$('#overlay'); o.className='show';
  o.innerHTML='<div class="levelbox"><div class="big">🎁 DAILY CHEST</div>'+
    '<div class="sub">All dailies cleared. The chest creaks open…</div>'+
    '<div class="sub"><span style="color:var(--xp)">+'+res.xp+' XP</span> &nbsp; <span style="color:var(--gold)">+'+res.coins+' 💰</span></div>'+
    '<button class="btn go" onclick="closeOverlay()">Nice ▶</button></div>';
}
function closeOverlay(){ $('#overlay').className=''; render(); }

/* ---------- rendering ---------- */
function skillName(id){ var s=state.skills.find(function(k){return k.id===id;}); return s? s.icon+' '+s.name : null; }

function renderHUD(){
  var h=state.hero, need=RPG.xpForLevel(h.level), r=RPG.rankFor(h.level), nr=RPG.nextRank(h.level);
  var col=RANK_COLORS[r.code]||'var(--gold)';
  $('#hud').innerHTML=
    '<div class="avatar" style="border-color:'+col+'" onclick="openCharacter()" title="Customize character">'+h.avatar+'</div>'+
    '<div class="who"><div class="name">'+esc(h.name)+' <span class="rank" style="color:'+col+';border-color:'+col+'">'+r.code+' · '+r.name+'</span></div>'+
    (h.title?'<div class="herotitle">“'+esc(h.title)+'”</div>':'')+
    '<div class="bars">'+
      '<div class="bar xp"><i style="width:'+Math.min(100,h.xp/need*100)+'%"></i><b>XP '+h.xp+' / '+need+'</b></div>'+
      '<div class="bar hp"><i style="width:'+(h.hp/RPG.MAX_HP*100)+'%"></i><b>HP '+h.hp+' / '+RPG.MAX_HP+'</b></div>'+
    '</div></div>'+
    '<div class="side"><div class="lvl">LV.'+h.level+'</div>'+
      '<div class="coin" id="coinCounter">💰 '+h.coins+'</div>'+
      '<div class="flame">🔥 '+h.streak+' day'+(h.streak===1?'':'s')+((h.shields||0)>0?' <span title="Streak Shield active">🛡</span>':'')+'</div>'+
      (h.woundedOn===RPG.todayKey()?'<div class="nextrank" style="color:var(--hp)">🩸 wounded · ×0.5 XP</div>':'')+
      (nr?'<div class="nextrank">▲ rank '+nr.code+' at Lv.'+nr.min+'</div>':'<div class="nextrank">MAX RANK</div>')+'</div>';
}

function renderSkills(){
  var html = state.skills.map(function(s){
    var need=RPG.skillXpForLevel(s.level);
    return '<div class="skillcard"><div class="t"><span>'+s.icon+' '+esc(s.name)+'</span><small>Lv.'+s.level+'</small></div>'+
      '<div class="bar"><i style="width:'+Math.min(100,s.xp/need*100)+'%"></i></div>'+
      '<button class="del" onclick="delSkill(\''+s.id+'\')">✕</button></div>';
  }).join('');
  html += '<button class="addskill" onclick="addSkillPrompt()">+ life area</button>';
  $('#skillsRow').innerHTML = html;
}

var TABS=[['today','☀','TODAY','pri'],['quests','⚔','QUESTS','pri'],['habits','🌱','HABITS','pri'],['focus','⏳','FOCUS','sec'],['market','🏪','MARKET','sec'],['journal','📔','JOURNAL','sec'],['stats','📊','STATS','sec']];
function renderTabs(){
  var chest=A.chestStatus(state);
  $('#tabs').innerHTML = TABS.map(function(t){
    var dot=((t[0]==='quests'||t[0]==='today')&&chest.eligible)||(t[0]==='focus'&&state.activeFocus)?'<span class="dot"></span>':'';
    return '<button class="'+t[3]+(tab===t[0]?' on':'')+'" onclick="go(\''+t[0]+'\')"><span class="ti">'+t[1]+'</span><span class="tl">'+t[2]+'</span>'+dot+'</button>';
  }).join('');
}
function go(t){ tab=t; render(); }

  }
};
function presetChips(kind){
  var arr = kind==='shop' ? PRESETS.shop[shopTab] : PRESETS[kind];
  var chips = arr.map(function(p,i){
    return '<button onclick="usePreset(\''+kind+'\','+i+')">+ '+esc(kind==='quest'||kind==='shop'?p[0]:p)+(kind==='shop'?' · '+p[1]+'💰':'')+'</button>';
  }).join('');
  return '<div class="presets"><span class="plabel">quick add:</span>'+chips+'</div>';
}
function usePreset(kind,i){
  if(kind==='quest'){ var p=PRESETS.quest[i]; if(dupe(state.quests,p[0]))return; A.addQuest(state,{title:p[0],diff:p[1]}); }
  if(kind==='good'){ var t=PRESETS.good[i]; if(dupe(state.habits,t))return; A.addHabit(state,{title:t,type:'good'}); }
  if(kind==='bad'){ var t2=PRESETS.bad[i]; if(dupe(state.habits,t2))return; A.addHabit(state,{title:t2,type:'bad'}); }
  if(kind==='shop'){ var s=PRESETS.shop[shopTab][i]; if(dupe(state.shop,s[0]))return; A.addShopItem(state,{title:s[0],price:s[1],tab:shopTab,hp:s[2]||0,dmg:s[3]||0,special:s[4]||null}); }
  persist(); render();
}
function dupe(list,title){ return list.some(function(x){return x.title===title;}); }

function questRow(q){
  var today=RPG.todayKey(), done=q.doneOn===today || (!q.recurring && q.doneOn);
  var meta=[diffChip(q.diff)];
  if(q.skillId&&skillName(q.skillId)) meta.push('<span class="chip skill">'+skillName(q.skillId)+'</span>');
  if(q.due){ meta.push('<span class="chip '+(q.due<today?'late':'due')+'">'+(q.due<today?'⚠ late ':'due ')+q.due+'</span>'); }
  return '<div class="item'+(done?' done':'')+'"><div class="grow"><div class="title">'+esc(q.title)+'</div>'+
    '<div class="meta">'+meta.join('')+'</div></div>'+
    (done?'<span style="color:var(--good);font-weight:700">✓</span>'
      :'<button class="btn go" onclick="doQuest(\''+q.id+'\')">Clear</button>')+
    (!q.recurring&&!done?'<button class="btn ghost" style="color:var(--gold)" title="Upgrade to main quest" onclick="promoteQ(\''+q.id+'\')">⬆</button>':'')+
    '<button class="btn ghost" onclick="delQuest(\''+q.id+'\')">✕</button></div>';

function chestChip(){
  var c=A.chestStatus(state);

  if(c.claimed) return '<span class="chestchip claimed">🎁 claimed ✓</span>';
  if(c.eligible) return '<button class="chestchip ready" onclick="claimChest()">🎁 OPEN CHEST!</button>';
  return '<span class="chestchip">🎁 '+c.done+'/'+c.total+'</span>';

  var items=A.agenda(state);

    var hit=(h.history||[]).indexOf(k)>=0;

  }
  return '<span class="hdots">'+out+'</span>';
}

/* ---------- focus tab (pomodoro) ---------- */
function fmtTime(ms){
  var s=Math.max(0,Math.ceil(ms/1000)), m=Math.floor(s/60), r=s%60;
  return (m<10?'0':'')+m+':'+(r<10?'0':'')+r;
}
function musicId(){
  var m=state.settings.music;
  if(m==='custom'){
    var match=(state.settings.musicUrl||'').match(/(?:v=|youtu\.be\/|embed\/|live\/)([\w-]{11})/);
    return match?match[1]:null;
  }
  return (MUSIC[m]||{}).id||null;
}
function ytEmbed(){
  var id=musicId();
  if(!id) return '';
  if(location.protocol==='file:'){
    return '<div class="hint" style="margin-top:14px">YouTube blocks embedded players on local files (error 153) — use the pop-out player instead:</div>'+
      '<button class="btn" style="margin-top:8px" onclick="openMusicWin()">🎵 Open music player window</button>';
  }
  return '<div class="yt"><iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&playsinline=1" allow="autoplay; encrypted-media" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen title="study music"></iframe></div>'+
    '<div class="hint">needs internet — pick another stream or paste any YouTube URL in setup</div>';
}
function openMusicWin(){
  var id=musicId(); if(!id) return;
  window.open('https://www.youtube.com/watch?v='+id,'smlMusic','width=520,height=340,menubar=no,toolbar=no,location=no');
}
function ringSvg(pct,cls,size){
  size=size||190;
  var r=Math.round(size/2-9), c=size/2, C=2*Math.PI*r;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="9"/>'+
    '<circle id="ringFg" data-r="'+r+'" cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+(cls==='brk'?'var(--orange)':'var(--xp)')+'" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+(C*(1-pct))+'" style="transition:stroke-dashoffset 1s linear"/></svg>';
}
function sessionStats(f){
  var workedMin=Math.floor(A.focusWorkedMs(state)/60000);
  var xp=Math.round(workedMin*1.2), coins=Math.round(workedMin*0.6);
  return '<div class="sesh"><span>worked <b class="g" id="seshMin">'+workedMin+'</b> min</span>'+
    '<span>banked so far <b id="seshPay">'+xp+'xp / '+coins+'💰</b></span>'+
    '<span>cycles <b>'+f.cycles+'</b></span></div>';
}
function renderFocus(){
  var f=state.activeFocus;
  if(f){
    var phaseTotal=(f.phase==='work'?f.work:f.brk)*60000;
    var left=f.phaseEnd-Date.now(), pct=RPG.clamp(1-left/phaseTotal,0,1);
    if(f.phase==='work'){
      $('#view').innerHTML='<div class="panel focusbox">'+
        '<div class="phase work">⚔ WORK PHASE'+(f.brk>0?' · break in '+fmtTime(left):'')+'</div>'+
        '<div class="focusring">'+ringSvg(pct,'work')+'<div class="time" id="countdown">'+fmtTime(left)+'</div></div>'+
        (f.label?'<div class="doing">Fighting: <b>'+esc(f.label)+'</b></div>':'')+
        sessionStats(f)+
        '<div class="hint" style="margin-top:8px">Runs '+f.work+' min work'+(f.brk>0?' / '+f.brk+' min break':'')+' on repeat until you stop. You are paid for every worked minute.</div>'+
        ytEmbed()+
        '<button class="btn buy" style="margin-top:14px" onclick="stopFocus()">⏹ Stop & collect</button></div>';
    } else {
      $('#view').innerHTML='<div class="panel focusbox break">'+
        '<div class="phase brk">🏕 BREAK — REST AT THE CAMPFIRE</div>'+
        '<div class="campfire"><span class="tent">⛺</span><span class="fire">🔥</span><span class="moon">🌙</span>'+

function startFocus(){
  var w=Number($('#fWork').value)||focusMode.work;
  var b=$('#fBrk').value===''?focusMode.brk:Number($('#fBrk').value);
  A.startFocus(state,{work:w,brk:b,skillId:$('#fSkill').value||null,label:$('#fLabel').value});
  persist(); render();
}
function stopFocus(){
  var r=A.stopFocus(state); persist(); render();
  if(!r) return;
  if(r.tooShort){ toast('<span class="h">Stopped at '+r.minutes+' min — under 5, nothing earned</span>','dmg'); return; }
  SND.chest(); confetti(); fx(r);
  toast('⏳ <span class="p">'+r.minutes+' min of real work collected</span>');
  afterAction();
}
function skipBreak(){ var ev=A.skipBreak(state); persist(); render(); if(ev&&ev.healed) toast('<span class="hg">+'+ev.healed+' HP — rested</span>'); SND.resume(); }
function checkFocus(){
  var f=state.activeFocus;
  if(!f) return;
  var ev=A.tickFocus(state);
  if(ev){
    persist(); render();
    if(ev.event==='break'){ SND.brk(); toast('🏕 <span style="color:var(--orange)">Break time — rest at the campfire</span>'); }
    else { SND.resume(); if(ev.healed>0){ fx({hp:ev.healed}); } toast('⚔ <span class="p">Back to work — cycle '+state.activeFocus.cycles+'</span>'); }
    return;
  }
  if(tab==='focus'){
    var left=f.phaseEnd-Date.now();
    var cd=$('#countdown'); if(cd) cd.textContent=fmtTime(left);
    var ring=$('#ringFg');
    if(ring){
      var total=(f.phase==='work'?f.work:f.brk)*60000, pct=RPG.clamp(1-left/total,0,1);
      var C=2*Math.PI*Number(ring.getAttribute('data-r')||86);
      ring.setAttribute('stroke-dashoffset',C*(1-pct));
    }
    var sm=$('#seshMin'), sp=$('#seshPay');
    if(sm){ var wm=Math.floor(A.focusWorkedMs(state)/60000); sm.textContent=wm; if(sp) sp.textContent=Math.round(wm*1.2)+'xp / '+Math.round(wm*0.6)+'💰'; }
  }
}

function renderStats(){
  var w=RPG.weekStats(state);
  var maxXp=Math.max.apply(null,w.days.map(function(d){return w.per[d].xp;}).concat([1]));
  var chart=w.days.map(function(d){
    var v=w.per[d].xp, h=Math.round(v/maxXp*100);
    var lbl=['S','M','T','W','T','F','S'][new Date(d+'T00:00:00').getDay()];
    return '<div class="col"><div class="cl" style="color:var(--xp)">'+(v||'')+'</div><div class="colbar" style="height:'+Math.max(2,h)+'%"></div><div class="cl">'+lbl+'</div></div>';
  }).join('');
  var achHtml=RPG.ACHIEVEMENTS.map(function(a){
    var got=state.achievements.find(function(u){return u.id===a.id;});
    return '<div class="ach '+(got?'unlocked':'locked')+'"><span class="ic">'+a.icon+'</span>'+
      '<div><div class="n">'+a.name+'</div><div class="d">'+a.desc+(got?' · '+got.on:'')+'</div></div></div>';
  }).join('');
  var byDay={};
  state.log.forEach(function(e){ (byDay[e.day]=byDay[e.day]||[]).push(e); });
  var days=Object.keys(byDay).sort().reverse();
  var logHtml=days.map(function(d){
    return '<div class="logday">'+(d===RPG.todayKey()?'TODAY':d)+'</div>'+
      byDay[d].map(function(e){
        var t=new Date(e.t), tm=('0'+t.getHours()).slice(-2)+':'+('0'+t.getMinutes()).slice(-2);
        var dd=[];
        if(e.xp) dd.push('<span class="p">+'+e.xp+'xp</span>');
        if(e.coins>0) dd.push('<span class="c">+'+e.coins+'💰</span>');
        if(e.coins<0) dd.push('<span class="c">'+e.coins+'💰</span>');
        if(e.hp>0) dd.push('<span class="hg">+'+e.hp+'hp</span>');
        if(e.hp<0) dd.push('<span class="h">'+e.hp+'hp</span>');
        return '<div class="logrow"><span class="tm">'+tm+'</span><span>'+e.icon+'</span>'+
          '<span>'+esc(e.text)+'</span><span class="delta">'+dd.join(' ')+'</span></div>';
      }).join('');
  }).join('')||'<div class="empty">Nothing logged yet. Go clear a quest.</div>';

  $('#view').innerHTML='<div class="panel"><h3>📊 Week in review — for your Friday planning</h3>'+
    '<div class="statgrid">'+
    '<div class="stat"><div class="v g">'+w.tot.xp+'</div><div class="k">XP earned</div></div>'+
    '<div class="stat"><div class="v">'+w.tot.earned+'</div><div class="k">💰 earned</div></div>'+
    '<div class="stat"><div class="v">'+w.tot.spent+'</div><div class="k">💰 spent</div></div>'+
    '<div class="stat"><div class="v b">'+w.tot.quests+'</div><div class="k">quests cleared</div></div>'+
    '<div class="stat"><div class="v g">'+w.tot.habits+'</div><div class="k">habits kept</div></div>'+
    '<div class="stat"><div class="v r">'+w.tot.slips+'</div><div class="k">monster hits</div></div>'+
    '<div class="stat"><div class="v b">'+Math.floor(w.tot.focusMin/60)+'h'+(w.tot.focusMin%60)+'</div><div class="k">focus time</div></div>'+
    '</div>'+
    '<div class="chart">'+chart+'</div>'+
    '<div class="hint" style="text-align:center;margin-top:2px">XP per day, last 7 days</div>'+
    '<div class="moodstrip">'+w.moods.map(function(m){return '<span>'+m.emoji+'</span>';}).join('')+'</div>'+
    '<div class="hint" style="text-align:center">mood, last 7 days</div></div>'+
    '<div class="panel" style="margin-top:14px"><h3>🏆 Achievements <span class="cnt">'+state.achievements.length+'/'+RPG.ACHIEVEMENTS.length+'</span></h3>'+
    '<div class="achgrid">'+achHtml+'</div></div>'+
    '<div class="panel" style="margin-top:14px"><h3>📜 Adventure log</h3>'+logHtml+'</div>';
}

    '<button class="btn" onclick="tut(0)">❓ Tutorial</button></div>'+
    '<div class="setrow">'+
    '<button class="btn" onclick="toggleSound()">'+(state.settings.sound?'🔊 Sound ON':'🔇 Sound OFF')+'</button></div>'+
    '<div class="setrow"><button class="btn" onclick="exportSave()">⬇ Export save (JSON)</button>'+
    '<button class="btn" onclick="$(\'#importFile\').click()">⬆ Import save</button></div>'+
    '<input type="file" id="importFile" accept=".json" style="display:none" onchange="importSave(this)">'+
    '<div class="setrow"><button class="btn" style="border-color:var(--hp);color:var(--hp)" onclick="resetAll()">Reset everything</button>'+
    '<button class="btn" onclick="closeModal()">Close</button></div>'+
    '<div class="hint">Data lives in this browser (localStorage). Export a JSON backup from time to time.</div></div>';
}
function toggleSound(){ state.settings.sound=!state.settings.sound; persist(); openSettings(); if(state.settings.sound) SND.earn(); }
function closeModal(){ $('#modal').className='modal'; }
function exportSave(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='scalemylife-save-'+RPG.todayKey()+'.json'; a.click();
}
function importSave(input){
  var f=input.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){ try{ var s=JSON.parse(r.result);
      if(!s||!s.hero) throw 0;
      state=RPG.migrate(s); persist(); applyTheme(); closeModal(); render(); toast('<span class="p">Save imported</span>');
    }catch(e){ toast('<span class="h">That file is not a valid save</span>','dmg'); } };
  r.readAsText(f);
}
function resetAll(){
  if(confirm('Delete ALL progress and start over?') && confirm('Really? This cannot be undone (unless you exported a backup).')){
    localStorage.removeItem(RPG.KEY); state=null; closeModal(); boot();
  }
}

/* ---------- tutorial ---------- */
var TUT=[
  {icon:'⚔',title:'YOUR LIFE IS THE GAME',body:'ScaleMyLife turns real life into an RPG. Doing real work — tasks, habits, focused study — earns XP and coins. XP levels you up through ranks E to SS. Coins buy real pleasures, guilt-free, because you earned them.'},
  {icon:'🏆',title:'QUESTS & HABITS',body:'Main quests are your big goals, broken into steps. Daily quests reset every morning — clear them all and a bonus chest opens. Good habits build streaks; bad habits are monsters that hit your HP when you slip. Honesty is part of the game.'},
  {icon:'⏳',title:'FOCUS & THE MARKET',body:'The Focus tab runs pomodoro cycles and pays you for every worked minute. Spend your coins in the Market on rewards YOU define — gaming, series, treats. The Hotel restores HP. The Black Market sells breaking your own rules… for coins AND HP.'},
  {icon:'☀️',title:'EVERY DAY',body:'The Today tab is your home base: dailies, habit checks, deadlines and quick actions in one place. Log your mood and sleep, keep the streak alive — each consecutive day multiplies all XP up to ×1.5. That is the whole loop. Ready?'}
];
function tut(i){
  var m=$('#modal'); m.className='modal show';
  var t=TUT[i], last=i===TUT.length-1;
  m.innerHTML='<div class="box" style="text-align:center"><div class="tutbig">'+t.icon+'</div>'+
    '<h2 style="justify-content:center">'+t.title+'</h2>'+
    '<div style="font-size:14.5px;line-height:1.6;color:var(--ink)">'+t.body+'</div>'+
    '<div class="tdots">'+TUT.map(function(_,j){return '<i class="'+(j===i?'on':'')+'"></i>';}).join('')+'</div>'+
    '<div class="setrow" style="margin-top:14px">'+
    '<button class="btn" onclick="tutSkip()">Skip</button>'+
    (i>0?'<button class="btn" onclick="tut('+(i-1)+')">◀ Back</button>':'')+
    '<button class="btn go" onclick="'+(last?'tutSkip()':'tut('+(i+1)+')')+'">'+(last?(state?'Done ✓':'▶ Create my hero'):'Next ▶')+'</button>'+
    '</div></div>';
}
function tutSkip(){ if(state){ closeModal(); } else { onboarding(); } }

/* ---------- onboarding ---------- */
function onboarding(){
  var prev=$('#obName'); var keep=prev?prev.value:'';
  pickedAv=pickedAv||'🧙';
  var m=$('#modal'); m.className='modal show';
  m.innerHTML='<div class="box"><h2>⚔ SCALEMYLIFE<br><span style="font-size:10px;color:var(--muted)">CREATE YOUR HERO</span></h2>'+
    '<div class="hint" style="margin-bottom:6px">Your real life is the game. Name your character:</div>'+
    '<input id="obName" placeholder="Hero name" maxlength="24" value="'+esc(keep)+'">'+
    '<div class="avpick">'+AVATARS.slice(0,12).map(function(a){
      return '<button class="'+(pickedAv===a?'on':'')+'" onclick="pickedAv=\''+a+'\';onboarding()">'+a+'</button>';}).join('')+'</div>'+
    '<button class="btn wide go" onclick="createHero()">▶ START ADVENTURE</button>'+
    '<div class="hint" style="margin-top:10px">You start with 50 💰, sample quests, habits and rewards — edit everything. Full customization behind your avatar.</div></div>';
  var inp=$('#obName'); if(inp && !inp.value) inp.focus();
}
function createHero(){
  var n=$('#obName').value.trim()||'Hero';
  state=RPG.seed(RPG.newState(n,pickedAv||'🧙'));
  pickedAv=null;
  RPG.addLog(state,'🎮','A new adventure begins. Welcome, '+n+'!');
  persist(); applyTheme(); closeModal(); render(); confetti();
}
function boot(){ applyTheme(); if(state){ seenDay=state.lastSeenDay; render(); checkFocus(); } else { renderHUDShell(); tut(0); } }
function renderHUDShell(){ $('#hud').innerHTML='<div class="avatar">❔</div><div class="who"><div class="name">…</div></div><div></div>'; $('#tabs').innerHTML=''; $('#skillsRow').innerHTML=''; $('#view').innerHTML=''; }

setInterval(function(){ if(state){ checkFocus(); if(state.lastSeenDay!==RPG.todayKey()){ render(); } } }, 1000);

boot();
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
