<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- Static hosts can't set response headers, so CSP ships as a meta tag. Inline
     handlers are the app's wiring, hence 'unsafe-inline'; the win is blocking
     every external script/connect/frame origin except the ones listed. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://rbhjqvfuvzpqrxmvfimd.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; frame-src https://www.youtube-nocookie.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>ScaleMyLife</title>
<meta name="description" content="Turn your real life into an RPG. Quests, habits, a paid focus timer, life-area levels, streaks and a friends leaderboard - your character grows when you do. Free, offline-first, no ads, no tracking.">
<link rel="canonical" href="https://scale-my-life.vercel.app/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ScaleMyLife">
<meta property="og:title" content="ScaleMyLife - turn your real life into an RPG">
<meta property="og:description" content="Quests, habits, a focus timer that pays XP, streaks, defeats and comebacks, friends and leaderboards. Your character grows when you do.">
<meta property="og:url" content="https://scale-my-life.vercel.app/">
<meta property="og:image" content="https://scale-my-life.vercel.app/icon-512.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="ScaleMyLife - turn your real life into an RPG">

<meta name="twitter:image" content="https://scale-my-life.vercel.app/icon-512.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12101f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="bg" aria-hidden="true"></canvas>
<div class="wrap" id="wrap">
  <div class="logo"><b>SCALE MY LIFE</b><button class="gear" onclick="openSettings()" title="Settings" aria-label="Settings">⚙️</button></div>
  <div class="hud" id="hud"></div>
  <div class="skills" id="skillsRow"></div>
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
</div>
<div id="toasts" aria-live="polite" aria-atomic="false"></div>
<div id="overlay" role="status" aria-live="polite"></div>
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Dialog"></div>

<script src="gradient.js"></script>
<script src="cloud.js"></script>
<script src="core.js"></script>
